<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="shortcut icon" href="./img/icon.png" type="image/x-icon">

    <link rel="stylesheet" href="./styleSignIn.css">
</head>
<body>
    <div class="main">
        <div class="otherWindow">
            <img src="./img/window.png" alt="">
        </div>
        <div class="signInWindow">
            <div class="container">

    <img src="./img/icon.png" class="logo">

    <h1>JOIN THE <span>RIDE</span></h1>
    <p>Create your account and start your journey</p>

    <form>
        <input type="email" class="email" placeholder="Email address">
        <input type="password" placeholder="Password" class="pas1">
        <input type="password" placeholder="Confirm password" class="pas2">

        <div class="check">
            <input type="checkbox">
            <label>I agree to the <span>Terms of Service</span></label>
        </div>

        <div class="check">
            <input type="checkbox">
            <label>Subscribe to newsletter</label>
        </div>

        <button class="signup">SIGN UP</button>

        <p class="login">
            Already have an account? <a href="login.html">Log in</a>
        </p>
    </form>

</div>

        </div>
        
    </div>

    <script src="./appSignIn.js"></script>
</body>
</html>
